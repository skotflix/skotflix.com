<!doctype html>
<html>
    <head>
        <title>Skotflix</title>
        <style>
            html,
            body {
                background-color: #000;
            }
            html {
                height: 100%;
            }
            body {
                margin: 0;
                min-height: 100%;
                padding: 0;
                text-align: center;
            }
            .betteruptime-announcement__placeholder {
                height: unset!important;
            }
            #skotflix {
                display: none;
            }
            #skotflix img,
            #skotflix source {
                width: 100%;
            }
            #skotflix .footer {
                color: #737373;
                font-family: sans-serif;
                font-size: 2em;
                font-weight: bold;
                padding-bottom: 14px;
                padding-left: 16px;
                padding-right: 16px;
                padding-top: 14px;
                word-spacing: 25px;
            }
            #skotflix .footer .link {
                display: inline-block;
            }
            #skotflix .footer .link:not(:last-child)::after {
                color: #737373;
                content: "\2022";
                padding-left: 1em;
                padding-right: 1em;
            }
            #skotflix .footer .link a {
                color: #737373;
                text-decoration: none;
            }
            #skotflix .footer .link a:hover {
                color: #737373;
                text-decoration: underline;
            }
            #skotflix .footer .link .status {
                display: inline-block;
                position: relative;
            }
            #skotflix .footer .link .status a,
            #skotflix .footer .link .status iframe {
                display: block; 
            }
            #skotflix .footer .link .status iframe {
                padding-top: 0.5em;
            }
        </style>
    </head>
    <body>
        <picture id="skotflix"
            ><source srcset="c395e19fc008687a7f039675cb4a4280.webp" type="image/webp" />
            <source srcset="c395e19fc008687a7f039675cb4a4280.png" type="image/png" />
            <img src="c395e19fc008687a7f039675cb4a4280.png" />
            <div class="footer">
                <div class="link">
                    <a href="https://requests.skotflix.com">Requests</a>
                </div>
                <div class="link">
                    <div class="status">
                        <a href="https://status.skotflix.com">Status</a>
                        <iframe
                            src="https://status.skotflix.com/badge?theme=dark"
                            width="250"
                            height="30"
                            frameborder="0"
                            scrolling="no"
                            style="color-scheme: normal">
                        </iframe>
                    </div>
                </div>
                <div class="link">
                    <a href="https://watch.skotflix.com">Watch</a>
                </div>
            </div>
        </picture>
        <script>
            var i = document.getElementById("skotflix"),
                m = { h: 365, w: 1240 },
                s = function (w) {
                    var a = w.h > m.h ? 1 : w.h / m.h,
                        b = w.w > m.w ? 1 : w.w / m.w;
                    return a > b ? b : a;
                },
                z = function () {
                    var w = {
                            h: Math.max(document.documentElement.clientHeight, window.innerHeight || 0),
                            w: Math.max(document.documentElement.clientWidth, window.innerWidth || 0),
                        },
                        l = { h: m.h * s(w), w: m.w * s(w) },
                        p = { h: w.h - l.h > 0 ? (w.h - l.h) / 2 : 0, w: w.w - l.w > 0 ? (w.w - l.w) / 2 : 0 };
                    i.setAttribute(
                        "style",
                        "display:block;height:" + l.h + "px;padding-bottom:" + p.h + "px;padding-left:" + p.w + "px;padding-right:" + p.w + "px;padding-top:" + p.h + "px;width:" + l.w + "px"
                    );
                };
            i.onload = z;
            window.onload = z;
            window.onresize = z;
        </script>
        <script
            src="https://uptime.betterstack.com/widgets/announcement.js"
            data-id="165759"
            async="async"
            type="text/javascript">
        </script>
    </body>
</html>
